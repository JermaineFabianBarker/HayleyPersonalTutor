// ── Spaced Repetition (Leitner Boxes) ──
// Box 1: review in 1 day, Box 2: 3 days, Box 3: 7 days, Box 4: 14 days, Box 5: 30 days (mastered)
const LEITNER_INTERVALS = [0, 1, 3, 7, 14, 30]; // days per box (box 0 = new)

function getSRQueue(studentId) {
  return LS.get(`sr_${studentId}`, {});
}
function updateSR(studentId, questionId, correct) {
  const q = getSRQueue(studentId);
  const entry = q[questionId] || { box: 0, next: Date.now(), attempts: 0, correct: 0 };
  entry.attempts++;
  if (correct) {
    entry.correct++;
    entry.box = Math.min(entry.box + 1, 5);
  } else {
    entry.box = Math.max(entry.box - 1, 1); // wrong = back one box, minimum box 1
  }
  const days = LEITNER_INTERVALS[entry.box] || 1;
  entry.next = Date.now() + days * 86400000;
  entry.lastReview = Date.now();
  q[questionId] = entry;
  LS.set(`sr_${studentId}`, q);
}
function getDueQuestions(studentId) {
  const q = getSRQueue(studentId);
  const now = Date.now();
  return Object.entries(q).filter(([_, e]) => e.next <= now && e.box < 5).map(([id]) => id);
}

// ── Adaptive Difficulty Engine ──
function getAdaptiveQuestions(subject, studentId, count = 8) {
  const all = QB[subject] || [];
  const sr = getSRQueue(studentId);
  const due = getDueQuestions(studentId);
  
  // Priority 1: Due spaced-repetition questions (max 3)
  const dueQs = all.filter(q => due.includes(q.id)).slice(0, 3);
  
  // Priority 2: Questions they haven't seen yet
  const unseen = all.filter(q => !sr[q.id] && !dueQs.find(d => d.id === q.id));
  
  // Priority 3: Questions they've struggled with (box 1-2)
  const struggling = all.filter(q => {
    const e = sr[q.id];
    return e && e.box <= 2 && !dueQs.find(d => d.id === q.id);
  });
  
  // Build question set: due first, then mix unseen + struggling, sorted by Bloom's level
  let pool = [...dueQs];
  const remaining = [...unseen, ...struggling].sort(() => Math.random() - 0.5);
  pool = [...pool, ...remaining].slice(0, count);
  
  // Sort by difficulty for ZPD scaffolding (easy → hard)
  pool.sort((a, b) => a.diff - b.diff);
  
  return pool;
}

function App() {
  const [screen, setScreen] = useState('landing');
  const [user, setUser] = useState(LS.get('user', null));
  const [students, setStudents] = useState(LS.get('students', []));
  const [sessions, setSessions] = useState(LS.get('sessions', []));
  const [parentPin, setParentPin] = useState(LS.get('pin', ''));
  const [uploadedDocs, setUploadedDocs] = useState(LS.get('docs', []));

  useEffect(() => LS.set('user', user), [user]);
  useEffect(() => LS.set('students', students), [students]);
  useEffect(() => LS.set('sessions', sessions), [sessions]);
  useEffect(() => LS.set('pin', parentPin), [parentPin]);
  useEffect(() => LS.set('docs', uploadedDocs), [uploadedDocs]);

  const addStudent = (name, grade) => {
    const s = { id: 'stu_' + Date.now(), name, grade: grade || '5th', created: new Date().toISOString() };
    setStudents(p => [...p, s]);
    return s;
  };

  const recordSession = (studentId, subject, results) => {
    const s = { id: 'ses_' + Date.now(), studentId, subject, date: new Date().toISOString(), ...results };
    setSessions(p => [...p, s]);
  };

  // Routing
  if (screen === 'landing') return <Landing onStudent={() => setScreen('stu-login')} onParent={() => setScreen('par-login')} />;
  if (screen === 'stu-login') return <StuLogin students={students} addStudent={addStudent} onSelect={s => { setUser({...s, role:'student'}); setScreen('dashboard'); }} onBack={() => setScreen('landing')} />;
  if (screen === 'par-login') return <ParLogin pin={parentPin} setPin={p => { setParentPin(p); LS.set('pin', p); }} onOk={() => { setUser({role:'parent'}); setScreen('par-dash'); }} onBack={() => setScreen('landing')} />;
  if (screen === 'dashboard' && user?.role === 'student') return <Dashboard user={user} sessions={sessions.filter(s=>s.studentId===user.id)} onQuiz={s => setScreen('quiz-'+s)} onTutor={s => setScreen('tutor-'+s)} onReview={() => setScreen('review')} onUpload={() => setScreen('upload')} onLogout={() => { setUser(null); setScreen('landing'); }} />;
  
  const qm = screen.match(/^quiz-(.+)$/);
  if (qm && user?.role === 'student') return <Quiz subject={qm[1]} studentId={user.id} onDone={r => { recordSession(user.id, qm[1], r); setScreen('dashboard'); }} onBack={() => setScreen('dashboard')} />;
  
  const tm = screen.match(/^tutor-(.+)$/);
  if (tm && user?.role === 'student') return <Tutor subject={tm[1]} name={user.name} grade={user.grade} onBack={() => setScreen('dashboard')} />;
  
  if (screen === 'review' && user?.role === 'student') return <ReviewMode studentId={user.id} onBack={() => setScreen('dashboard')} />;
  if (screen === 'upload' && user?.role === 'student') return <DocUpload studentId={user.id} name={user.name} docs={uploadedDocs} setDocs={setUploadedDocs} onBack={() => setScreen('dashboard')} />;
  if (screen === 'par-dash') return <ParDash students={students} sessions={sessions} addStudent={addStudent} onLogout={() => { setUser(null); setScreen('landing'); }} />;
  
  return null;
}

/* ══════════════════════════════════════════════════════════════
   MODULE 3: ADAPTIVE QUIZ ENGINE
   ══════════════════════════════════════════════════════════════ */
function Quiz({ subject, studentId, onDone, onBack }) {
  const [questions] = useState(() => getAdaptiveQuestions(subject, studentId, 8));
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [fb, setFb] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [xp, setXp] = useState(0);
  const [streak, setStreak] = useState(0);

  const q = questions[cur];
  const subj = SUBJECTS.find(s => s.id === subject);
  if (!q) return <div className="min-h-screen flex items-center justify-center text-gray-400">No questions available yet.</div>;

  const check = () => {
    if (sel === null) return;
    setFb(true);
    const isCorrect = sel === q.ans;
    updateSR(studentId, q.id, isCorrect);
    if (isCorrect) { setCorrect(c=>c+1); setXp(x=>x+10+(streak>=2?5:0)); setStreak(s=>s+1); }
    else setStreak(0);
  };

  const next = () => {
    const finalCorrect = correct + (sel === q.ans && !fb ? 0 : 0); // already counted in check
    if (cur >= questions.length - 1) { onDone({ correct, total: questions.length, xp }); return; }
    setCur(c=>c+1); setSel(null); setFb(false);
  };

  return (
    <div className="min-h-screen bg-white flex flex-col">
      <div className="p-4 bg-white border-b border-gray-50">
        <div className="flex items-center gap-3 mb-1.5">
          <button onClick={onBack} className="text-gray-400 text-lg">&times;</button>
          <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full bg-gradient-to-r ${subj.color} rounded-full transition-all duration-500`} style={{width:`${(cur+1)/questions.length*100}%`}}/></div>
          <span className="text-[10px] text-gray-400 font-bold">{cur+1}/{questions.length}</span>
        </div>
        <div className="flex items-center gap-3 text-[11px]">
          <span className="text-amber-500 font-bold">⚡ {xp} XP</span>
          {streak>=2 && <span className="text-orange-500 font-bold">🔥 {streak} streak!</span>}
          <span className={`ml-auto px-2 py-0.5 rounded-full text-[10px] font-bold ${q.bl==='remember'?'bg-green-100 text-green-700':q.bl==='understand'?'bg-blue-100 text-blue-700':q.bl==='apply'?'bg-purple-100 text-purple-700':'bg-red-100 text-red-700'}`}>
            {q.bl.charAt(0).toUpperCase()+q.bl.slice(1)}
          </span>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-5">
        <div className="max-w-lg mx-auto">
          <span className={`inline-block px-2.5 py-0.5 ${subj.bg} ${subj.tx} rounded-full text-[10px] font-bold mb-2`}>{q.cat}</span>
          <h2 className="text-base font-bold text-gray-900 mb-5 leading-relaxed">{q.q}</h2>
          <div className="space-y-2.5">
            {q.opts.map((o,i) => (
              <button key={i} onClick={() => !fb && setSel(i)} className={`w-full p-3.5 rounded-xl text-left font-medium transition-all flex items-center gap-3 as98 text-sm ${
                fb ? i===q.ans ? 'border-2 border-green-500 bg-green-50' : i===sel ? 'border-2 border-red-500 bg-red-50' : 'border border-gray-100 bg-gray-50 opacity-30'
                : sel===i ? `border-2 ${subj.bd} ${subj.bg}` : 'border border-gray-200 bg-white'
              }`}>
                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${
                  fb&&i===q.ans?'bg-green-500 text-white':fb&&i===sel?'bg-red-500 text-white':sel===i?`bg-gradient-to-r ${subj.color} text-white`:'bg-gray-100 text-gray-500'
                }`}>{String.fromCharCode(65+i)}</div>
                <span className="flex-1">{o}</span>
              </button>
            ))}
          </div>
          {fb && (
            <div className={`mt-4 p-3.5 rounded-xl text-sm ${sel===q.ans?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
              <p className="font-bold text-xs mb-1">{sel===q.ans?'🎉 Correct! +10 XP':'❌ Not quite!'}</p>
              <p className="text-gray-700 text-xs leading-relaxed">{q.exp}</p>
            </div>
          )}
        </div>
      </div>
      <div className="p-4 border-t">
        <div className="max-w-lg mx-auto">
          {!fb ? (
            <button onClick={check} disabled={sel===null} className={`w-full py-3.5 rounded-xl font-bold transition-all as98 ${sel!==null?`bg-gradient-to-r ${subj.color} text-white shadow-lg`:'bg-gray-100 text-gray-300'}`}>Check Answer</button>
          ) : (
            <button onClick={next} className={`w-full py-3.5 rounded-xl font-bold bg-gradient-to-r ${subj.color} text-white shadow-lg as98 transition-transform`}>{cur>=questions.length-1?'See Results 🏆':'Continue →'}</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   MODULE 4: AI TUTOR (Claude API)
   ══════════════════════════════════════════════════════════════ */
function Tutor({ subject, name, grade, onBack }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const ref = useRef(null);
  const subj = SUBJECTS.find(s=>s.id===subject);

  useEffect(() => {
    setMsgs([{ role:'assistant', content:`Hey ${name}! 👋 I'm your ${subj.name} tutor.\n\nAsk me anything! For example:\n• "Explain fractions like I'm 10"\n• "Why did the Aztecs fall?"\n• "Help me with photosynthesis"\n• "Quiz me on grammar"\n\nWhat do you want to work on?` }]);
  }, []);

  useEffect(() => { ref.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);

  const send = async () => {
    if(!input.trim()||loading) return;
    const msg=input.trim(); setInput('');
    setMsgs(p=>[...p,{role:'user',content:msg}]);
    setLoading(true);
    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1000,
          system:`You are LeapIQ, a warm and encouraging AI tutor for ${name}, a ${grade} grader studying ${subj.name}.

TEACHING APPROACH (evidence-based pedagogy):
- Zone of Proximal Development: pitch explanations slightly above current level, scaffold with hints
- Bloom's Taxonomy: start with Remember/Understand, build to Apply/Analyze
- Spaced practice: reference concepts from previous questions when relevant
- Concrete before abstract: always start with real-world examples kids know
- Growth mindset language: "you're building this skill" not "you got it wrong"

RULES:
- Simple language for a ${grade} grader
- Break complex ideas into 2-3 small steps max
- Use analogies from their world (sports, games, food, school)
- Emojis: warm but sparse (1-2 per response)
- Under 150 words unless they ask for detail
- If wrong, ask a guiding question instead of just telling the answer
- Use mnemonics and memory tricks
- Celebrate effort: "Great question!" "I can see you're thinking about this"
- NEVER condescending. They are capable learners having a hard moment.

HAYLEY'S MAP DATA (if student is Hayley):
- Math RIT 208 (44th percentile) - dropped from 219 (81st)
- Weak areas: Number & Operations, Measurement & Data
- Strong: Algebraic Thinking (HiAvg), Reading (71st percentile)
- May have testing anxiety in math
- Currently in Math 180 program at school`,
          messages: msgs.filter(m=>m.role!=='system').concat({role:'user',content:msg}).map(m=>({role:m.role,content:m.content}))
        })
      });
      const d=await r.json();
      const reply=d.content?.map(c=>c.text||'').join('')||"Hmm, let me think about that differently. Try asking again?";
      setMsgs(p=>[...p,{role:'assistant',content:reply}]);
    } catch { setMsgs(p=>[...p,{role:'assistant',content:"Oops! Having trouble connecting. Try again in a sec. 🔄"}]); }
    setLoading(false);
  };

  return (
    <div className="min-h-screen bg-gray-50 flex flex-col">
      <div className={`bg-gradient-to-r ${subj.color} px-4 py-3 flex items-center gap-3`}>
        <button onClick={onBack} className="text-white/80">&larr;</button>
        <div className="w-7 h-7 bg-white/20 rounded-full flex items-center justify-center">🤖</div>
        <div><div className="text-white font-bold text-sm">{subj.name} Tutor</div><div className="text-white/50 text-[10px]">Ask me anything</div></div>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-3 no-sb">
        {msgs.map((m,i) => (
          <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
            <div className={`max-w-[85%] p-3.5 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap ${
              m.role==='user'?`bg-gradient-to-r ${subj.color} text-white rounded-br-sm`:'bg-white border border-gray-100 text-gray-800 rounded-bl-sm shadow-sm'}`}>{m.content}</div>
          </div>
        ))}
        {loading && <div className="flex justify-start"><div className="bg-white border border-gray-100 rounded-2xl rounded-bl-sm p-3 shadow-sm flex gap-1.5">
          <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{animationDelay:'0ms'}}/>
          <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{animationDelay:'150ms'}}/>
          <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{animationDelay:'300ms'}}/>
        </div></div>}
        <div ref={ref}/>
      </div>
      <div className="p-3 bg-white border-t">
        <div className="flex gap-2">
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Ask anything..." className="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-300"/>
          <button onClick={send} disabled={!input.trim()||loading} className={`px-4 rounded-xl font-bold text-sm as95 transition-all ${input.trim()?`bg-gradient-to-r ${subj.color} text-white`:'bg-gray-100 text-gray-300'}`}>Send</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   MODULE 5: SPACED REPETITION REVIEW MODE
   ══════════════════════════════════════════════════════════════ */
function ReviewMode({ studentId, onBack }) {
  const dueIds = getDueQuestions(studentId);
  const allQs = [...QB.math,...QB.history,...QB.science,...QB.english];
  const questions = allQs.filter(q => dueIds.includes(q.id));
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [fb, setFb] = useState(false);
  const [score, setScore] = useState(0);

  if (questions.length === 0) return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-white">
      <div className="text-5xl mb-4">✅</div>
      <h1 className="text-xl font-black text-gray-900 mb-2">All caught up!</h1>
      <p className="text-gray-500 text-sm mb-6">No questions due for review. Keep practicing to add more!</p>
      <button onClick={onBack} className="bg-blue-500 text-white font-bold py-3 px-8 rounded-xl as95 transition-transform">Back to Dashboard</button>
    </div>
  );

  const q = questions[cur];
  if (!q) { onBack(); return null; }
  const subj = SUBJECTS.find(s => QB[s.id]?.find(x=>x.id===q.id));
  const sr = getSRQueue(studentId)[q.id] || {};

  const check = () => {
    if(sel===null) return;
    setFb(true);
    const ok = sel===q.ans;
    updateSR(studentId, q.id, ok);
    if(ok) setScore(s=>s+1);
  };
  const next = () => {
    if(cur>=questions.length-1) { onBack(); return; }
    setCur(c=>c+1); setSel(null); setFb(false);
  };

  return (
    <div className="min-h-screen bg-white flex flex-col">
      <div className="p-4 bg-gradient-to-r from-orange-500 to-red-500">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="text-white/80">&times;</button>
          <div className="flex-1 text-white font-bold text-sm">🔄 Review Mode</div>
          <span className="text-white/70 text-xs">{cur+1}/{questions.length}</span>
        </div>
        <div className="flex items-center gap-2 mt-2 text-[10px] text-white/60">
          <span>Box {sr.box||1}</span>
          <span>•</span>
          <span>{sr.attempts||0} attempts</span>
          <span>•</span>
          <span>{sr.correct||0} correct</span>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-5">
        <div className="max-w-lg mx-auto">
          <span className="inline-block px-2.5 py-0.5 bg-orange-50 text-orange-600 rounded-full text-[10px] font-bold mb-2">{q.cat}</span>
          <h2 className="text-base font-bold text-gray-900 mb-5 leading-relaxed">{q.q}</h2>
          <div className="space-y-2.5">
            {q.opts.map((o,i) => (
              <button key={i} onClick={() => !fb && setSel(i)} className={`w-full p-3.5 rounded-xl text-left font-medium transition-all flex items-center gap-3 as98 text-sm ${
                fb ? i===q.ans ? 'border-2 border-green-500 bg-green-50' : i===sel ? 'border-2 border-red-500 bg-red-50' : 'border border-gray-100 opacity-30'
                : sel===i ? 'border-2 border-orange-400 bg-orange-50' : 'border border-gray-200'
              }`}>
                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${
                  fb&&i===q.ans?'bg-green-500 text-white':fb&&i===sel?'bg-red-500 text-white':sel===i?'bg-orange-500 text-white':'bg-gray-100 text-gray-500'
                }`}>{String.fromCharCode(65+i)}</div>
                <span className="flex-1">{o}</span>
              </button>
            ))}
          </div>
          {fb && <div className={`mt-4 p-3.5 rounded-xl text-sm ${sel===q.ans?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
            <p className="font-bold text-xs mb-1">{sel===q.ans?'🎉 Moving up!':'Back to review soon'}</p>
            <p className="text-gray-700 text-xs leading-relaxed">{q.exp}</p>
          </div>}
        </div>
      </div>
      <div className="p-4 border-t">
        {!fb ? <button onClick={check} disabled={sel===null} className={`w-full py-3.5 rounded-xl font-bold as98 ${sel!==null?'bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-lg':'bg-gray-100 text-gray-300'}`}>Check</button>
        : <button onClick={next} className="w-full py-3.5 rounded-xl font-bold bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-lg as98">{cur>=questions.length-1?'Done ✅':'Next →'}</button>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   MODULE 6: DOCUMENT UPLOAD + AI QUESTION GENERATION
   ══════════════════════════════════════════════════════════════ */
function DocUpload({ studentId, name, docs, setDocs, onBack }) {
  const [uploading, setUploading] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [genQuestions, setGenQuestions] = useState(null);
  const [practicing, setPracticing] = useState(null);
  const fileRef = useRef(null);

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    setUploading(true);
    
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const content = ev.target.result;
      const isImage = file.type.startsWith('image/');
      const doc = {
        id: 'doc_'+Date.now(),
        name: file.name,
        type: isImage ? 'image' : 'text',
        content: isImage ? content : content,
        date: new Date().toISOString(),
        studentId
      };
      setDocs(p => [...p, doc]);
      setUploading(false);
    };
    
    if(file.type.startsWith('image/')) reader.readAsDataURL(file);
    else reader.readAsText(file);
  };

  const generateFromDoc = async (doc) => {
    setGenerating(true);
    try {
      const msgContent = doc.type === 'image' 
        ? [{ type:'image', source:{type:'base64', media_type:'image/jpeg', data: doc.content.split(',')[1]} }, { type:'text', text:'Generate 6 multiple-choice quiz questions from this study material. The student is in 5th grade.' }]
        : `Generate 6 multiple-choice quiz questions from this study material for a 5th grader named ${name}. Here is the material:\n\n${doc.content.substring(0,3000)}`;

      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:2000,
          system:`You generate quiz questions from uploaded study materials. Return ONLY valid JSON array, no markdown, no backticks. Each object: {"q":"question text","opts":["A","B","C","D"],"ans":0,"exp":"explanation","cat":"category"}. ans is 0-indexed. Make questions age-appropriate for a 5th grader. Mix Bloom's levels: some remember, some understand, some apply.`,
          messages:[{role:'user', content: msgContent}]
        })
      });
      const d = await r.json();
      const text = d.content?.map(c=>c.text||'').join('') || '[]';
      const clean = text.replace(/```json|```/g,'').trim();
      const qs = JSON.parse(clean);
      setGenQuestions(qs);
    } catch(err) {
      console.error(err);
      setGenQuestions([]);
    }
    setGenerating(false);
  };

  // Practice generated questions
  if (practicing !== null && genQuestions) {
    return <GenQuizPractice questions={genQuestions} studentId={studentId} onBack={() => {setPracticing(null);setGenQuestions(null);}} />;
  }

  return (
    <div className="min-h-screen bg-gray-50 p-5">
      <button onClick={onBack} className="text-gray-400 text-sm mb-4">&larr; Back</button>
      <h1 className="text-xl font-black text-gray-900 mb-1">📄 Study Materials</h1>
      <p className="text-gray-500 text-sm mb-6">Upload tests, worksheets, or study guides. AI will generate practice questions from them.</p>
      
      <input ref={fileRef} type="file" accept="image/*,.txt,.pdf" className="hidden" onChange={handleFile} />
      <button onClick={() => fileRef.current?.click()} disabled={uploading} className="w-full bg-white border-2 border-dashed border-gray-300 rounded-2xl p-6 text-center hover:border-blue-400 transition-colors as98">
        <div className="text-3xl mb-2">{uploading ? '⏳' : '📎'}</div>
        <div className="font-bold text-gray-700 text-sm">{uploading ? 'Uploading...' : 'Tap to upload'}</div>
        <div className="text-gray-400 text-xs">Photos, text files, or PDFs</div>
      </button>

      {/* Generated Questions */}
      {generating && (
        <div className="mt-6 bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
          <div className="text-2xl mb-2 ap">🤖</div>
          <p className="text-blue-700 font-bold text-sm">Generating questions from your material...</p>
        </div>
      )}
      {genQuestions && genQuestions.length > 0 && (
        <div className="mt-6 bg-green-50 border border-green-200 rounded-xl p-4">
          <p className="text-green-700 font-bold text-sm mb-3">✅ {genQuestions.length} questions generated!</p>
          <button onClick={() => setPracticing(true)} className="w-full bg-green-500 text-white font-bold py-3 rounded-xl as95 transition-transform">Practice Now 🚀</button>
        </div>
      )}

      {/* Uploaded docs */}
      {docs.filter(d=>d.studentId===studentId).length > 0 && (
        <>
          <h2 className="font-bold text-gray-900 mt-6 mb-3 text-sm">Uploaded Materials</h2>
          {docs.filter(d=>d.studentId===studentId).reverse().map(doc => (
            <div key={doc.id} className="bg-white rounded-xl border border-gray-200 p-3 mb-2 flex items-center gap-3">
              <span className="text-lg">{doc.type==='image'?'🖼️':'📝'}</span>
              <div className="flex-1"><div className="font-semibold text-xs text-gray-900">{doc.name}</div><div className="text-[10px] text-gray-400">{new Date(doc.date).toLocaleDateString()}</div></div>
              <button onClick={() => generateFromDoc(doc)} disabled={generating} className="text-blue-500 text-xs font-bold as95">Generate Quiz</button>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

/* ── Practice Generated Questions ── */
function GenQuizPractice({ questions, studentId, onBack }) {
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [fb, setFb] = useState(false);
  const [score, setScore] = useState(0);

  if (cur >= questions.length) return (
    <div className="min-h-screen bg-gradient-to-b from-blue-600 to-indigo-700 flex flex-col items-center justify-center p-6 text-white">
      <div className="text-5xl mb-3">{score/questions.length>=0.8?'🏆':score/questions.length>=0.6?'⭐':'💪'}</div>
      <div className="text-4xl font-black mb-1">{Math.round(score/questions.length*100)}%</div>
      <p className="text-white/70 mb-6">{score} of {questions.length} correct</p>
      <button onClick={onBack} className="bg-white/20 text-white font-bold py-3 px-8 rounded-xl as95">Done</button>
    </div>
  );

  const q = questions[cur];
  const check = () => { if(sel===null) return; setFb(true); if(sel===q.ans) setScore(s=>s+1); };
  const next = () => { setCur(c=>c+1); setSel(null); setFb(false); };

  return (
    <div className="min-h-screen bg-white flex flex-col">
      <div className="p-4 bg-gradient-to-r from-indigo-500 to-purple-500 flex items-center gap-3">
        <button onClick={onBack} className="text-white/80">&times;</button>
        <span className="text-white font-bold text-sm flex-1">📄 From Your Materials</span>
        <span className="text-white/60 text-xs">{cur+1}/{questions.length}</span>
      </div>
      <div className="flex-1 p-5 overflow-y-auto">
        <span className="inline-block px-2.5 py-0.5 bg-purple-50 text-purple-600 rounded-full text-[10px] font-bold mb-2">{q.cat||'Study Guide'}</span>
        <h2 className="text-base font-bold text-gray-900 mb-5">{q.q}</h2>
        <div className="space-y-2.5">
          {q.opts.map((o,i) => (
            <button key={i} onClick={() => !fb && setSel(i)} className={`w-full p-3.5 rounded-xl text-left flex items-center gap-3 as98 text-sm ${
              fb ? i===q.ans?'border-2 border-green-500 bg-green-50':i===sel?'border-2 border-red-500 bg-red-50':'border border-gray-100 opacity-30'
              : sel===i?'border-2 border-purple-400 bg-purple-50':'border border-gray-200'
            }`}>
              <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${
                fb&&i===q.ans?'bg-green-500 text-white':fb&&i===sel?'bg-red-500 text-white':sel===i?'bg-purple-500 text-white':'bg-gray-100 text-gray-500'}`}>{String.fromCharCode(65+i)}</div>
              <span className="flex-1">{o}</span>
            </button>
          ))}
        </div>
        {fb && <div className={`mt-4 p-3.5 rounded-xl text-xs ${sel===q.ans?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
          <p className="font-bold mb-1">{sel===q.ans?'🎉 Nice!':'Keep going!'}</p>
          <p className="text-gray-700 leading-relaxed">{q.exp}</p>
        </div>}
      </div>
      <div className="p-4 border-t">
        {!fb ? <button onClick={check} disabled={sel===null} className={`w-full py-3.5 rounded-xl font-bold as98 ${sel!==null?'bg-gradient-to-r from-indigo-500 to-purple-500 text-white':'bg-gray-100 text-gray-300'}`}>Check</button>
        : <button onClick={next} className="w-full py-3.5 rounded-xl font-bold bg-gradient-to-r from-indigo-500 to-purple-500 text-white as98">
          {cur>=questions.length-1?'See Results 🏆':'Continue →'}
        </button>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   MODULE 7: PARENT DASHBOARD
   ══════════════════════════════════════════════════════════════ */
function ParDash({ students, sessions, addStudent, onLogout }) {
  const [newName, setNewName] = useState('');
  const [newGrade, setNewGrade] = useState('5th');
  const [adding, setAdding] = useState(false);
  const [expanded, setExpanded] = useState(null);

  return (
    <div className="min-h-screen bg-gray-50 pb-8">
      <div className="bg-gradient-to-r from-slate-800 to-slate-900 px-5 pt-6 pb-8 rounded-b-3xl">
        <div className="flex items-center justify-between mb-2">
          <div><p className="text-slate-400 text-xs">Parent Dashboard</p><h1 className="text-2xl font-black text-white">LeapIQ 📊</h1></div>
          <button onClick={onLogout} className="text-slate-400 text-[10px] bg-white/10 px-3 py-1 rounded-full">Logout</button>
        </div>
        <p className="text-slate-400 text-xs">Track learning progress across all subjects.</p>
      </div>
      <div className="px-5 -mt-3">
        {students.map(s => {
          const ss = sessions.filter(p => p.studentId === s.id);
          const xp = ss.reduce((a,p) => a+(p.xp||0), 0);
          const open = expanded === s.id;
          const sr = getSRQueue(s.id);
          const mastered = Object.values(sr).filter(e => e.box >= 5).length;
          const learning = Object.values(sr).filter(e => e.box >= 1 && e.box < 5).length;

          const breakdown = {};
          SUBJECTS.forEach(subj => {
            const sub = ss.filter(p => p.subject === subj.id);
            const tQ = sub.reduce((a,p) => a+(p.total||0), 0);
            const tC = sub.reduce((a,p) => a+(p.correct||0), 0);
            breakdown[subj.id] = { n:sub.length, tQ, tC, acc: tQ>0 ? Math.round(tC/tQ*100) : 0 };
          });

          return (
            <div key={s.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mt-3">
              <button onClick={() => setExpanded(open?null:s.id)} className="w-full p-4 flex items-center gap-4 text-left">
                <div className="w-11 h-11 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold">{s.name[0].toUpperCase()}</div>
                <div className="flex-1"><div className="font-bold text-gray-900 text-sm">{s.name}</div><div className="text-[10px] text-gray-400">{ss.length} sessions · {xp} XP · {mastered} mastered</div></div>
                <span className={`text-gray-400 transition-transform ${open?'rotate-90':''}`}>›</span>
              </button>
              {open && (
                <div className="px-4 pb-4 border-t border-gray-50 pt-3 af">
                  {ss.length === 0 ? <p className="text-gray-400 text-xs text-center py-4">No sessions yet.</p> : (
                    <div className="space-y-3">
                      {/* Subject breakdown */}
                      {SUBJECTS.map(subj => {
                        const b = breakdown[subj.id];
                        return (
                          <div key={subj.id} className="flex items-center gap-3">
                            <span className="text-lg w-7">{subj.icon}</span>
                            <div className="flex-1">
                              <div className="flex items-center justify-between mb-1"><span className="text-xs font-bold text-gray-900">{subj.name}</span><span className="text-[10px] text-gray-400">{b.n} sessions</span></div>
                              <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full bg-gradient-to-r ${subj.color} rounded-full`} style={{width:`${b.acc}%`}}/></div>
                              <div className="text-[10px] text-gray-400 mt-0.5">{b.tC}/{b.tQ} correct ({b.acc}%)</div>
                            </div>
                          </div>
                        );
                      })}
                      {/* Spaced rep stats */}
                      <div className="pt-3 border-t border-gray-100 grid grid-cols-3 gap-2 text-center">
                        <div className="bg-green-50 rounded-lg p-2"><div className="text-green-700 font-black text-lg">{mastered}</div><div className="text-[9px] text-green-600">Mastered</div></div>
                        <div className="bg-blue-50 rounded-lg p-2"><div className="text-blue-700 font-black text-lg">{learning}</div><div className="text-[9px] text-blue-600">Learning</div></div>
                        <div className="bg-orange-50 rounded-lg p-2"><div className="text-orange-700 font-black text-lg">{getDueQuestions(s.id).length}</div><div className="text-[9px] text-orange-600">Due</div></div>
                      </div>
                      {/* Recent sessions */}
                      <div className="pt-3 border-t border-gray-100">
                        <div className="text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-2">Recent Sessions</div>
                        {ss.slice(-5).reverse().map((sess,i) => {
                          const subj = SUBJECTS.find(x=>x.id===sess.subject);
                          const pct = sess.total>0?Math.round(sess.correct/sess.total*100):0;
                          return (
                            <div key={i} className="flex items-center gap-2 py-1 text-[11px]">
                              <span>{subj?.icon}</span>
                              <span className="text-gray-600">{new Date(sess.date).toLocaleDateString()}</span>
                              <span className="flex-1"/>
                              <span className={`font-bold ${pct>=80?'text-green-600':pct>=60?'text-amber-600':'text-red-500'}`}>{pct}%</span>
                              <span className="text-gray-400">({sess.correct}/{sess.total})</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {!adding ? (
          <button onClick={() => setAdding(true)} className="w-full py-3 border-2 border-dashed border-gray-300 rounded-2xl text-gray-400 font-semibold hover:border-blue-400 transition-colors mt-4 text-sm">+ Add Student</button>
        ) : (
          <div className="bg-white p-4 rounded-2xl border border-gray-200 mt-4">
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Student name" className="w-full p-3 border border-gray-200 rounded-xl mb-2 text-sm focus:outline-none focus:border-blue-400" autoFocus/>
            <select value={newGrade} onChange={e=>setNewGrade(e.target.value)} className="w-full p-3 border border-gray-200 rounded-xl mb-3 text-sm">
              {['3rd','4th','5th','6th','7th','8th'].map(g=><option key={g} value={g}>{g} Grade</option>)}
            </select>
            <div className="flex gap-2">
              <button onClick={()=>setAdding(false)} className="flex-1 py-2 text-gray-400 font-semibold text-sm">Cancel</button>
              <button onClick={()=>{if(newName.trim()){addStudent(newName.trim(),newGrade);setNewName('');setAdding(false);}}} className="flex-1 py-2 bg-blue-500 text-white rounded-xl font-bold text-sm">Add</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
